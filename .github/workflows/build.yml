name: Build Android APK
on: [push] # কোড পুশ করলেই অটো বিল্ড হবে

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build # আপনার প্রজেক্টের dist ফোল্ডার তৈরি করবে

      - name: Capacitor Sync
        run: |
          npx cap sync
          npx cap add android || true 
          # যদি আগে থেকে অ্যান্ড্রয়েড ফোল্ডার না থাকে তবে তৈরি করবে

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
